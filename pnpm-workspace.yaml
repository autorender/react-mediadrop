packages:
  - "packages/*"
  - "examples/*"
  - "apps/*"

allowBuilds:
  '@scarf/scarf': false
  esbuild: true
  keytar: false
  puppeteer: true
  sharp: true

overrides:
  "path-to-regexp@>=4.0.0 <6.3.0": ">=6.3.0"
  "tar@<7.5.19": ">=7.5.19"
  "fast-uri@>=3.0.0 <=3.1.3": ">=3.1.4"
  "sharp@<0.35.0": ">=0.35.0"

catalog:
  typescript: ^5.9.3
  vitest: ^4.1.10
  "@vitest/coverage-v8": ^4.1.10
  tsdown: ^0.22.3
  jsdom: ^29.1.1

minimumReleaseAgeExclude:
  - blume@1.0.4

# No dependency in this tree currently declares a preinstall/postinstall
# script (verified via `find node_modules/.pnpm -name package.json | xargs
# grep -l '"postinstall"\|"preinstall"'` during plan 006's audit) — an
# explicit empty allowlist keeps it that way: any future dependency that
# adds one is blocked from running it until someone deliberately adds it
# here, rather than silently executing arbitrary install-time code.
onlyBuiltDependencies: []
